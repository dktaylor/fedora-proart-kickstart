# ------------------------------------------------------------------------------
# INSTALLATION SOURCE & METHOD
# ------------------------------------------------------------------------------
graphical
url --mirrorlist=https://mirrors.fedoraproject.org/mirrorlist?repo=fedora-$releasever&arch=$basearch

# ------------------------------------------------------------------------------
# LOCALIZATION
# ------------------------------------------------------------------------------
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone America/Chicago --utc

# ------------------------------------------------------------------------------
# NETWORK
# ------------------------------------------------------------------------------
network --bootproto=dhcp --device=link --activate
network --hostname=fedora-dev

# ------------------------------------------------------------------------------
# SECURITY
# ------------------------------------------------------------------------------
selinux --enforcing
firewall --enabled --service=ssh

# ------------------------------------------------------------------------------
# ACCOUNTS
# NOTE: Change 'yourpassword' to a real password or use --iscrypted with a
#       sha512 hash. Generate one with:
#       python3 -c "import crypt; print(crypt.crypt('yourpassword', crypt.mksalt(crypt.METHOD_SHA512)))"
#
# SSH KEY INJECTION — TWO LAYERS:
#
# Layer 1 (here): Anaconda's native sshkey directive writes the key into
#   devuser's authorized_keys during the install phase itself, before %post
#   even runs. This is the cleanest method when you have access to the key
#   at install time (e.g. netboot/PXE installs or ISO rebuilds).
#
#   REPLACE THE PLACEHOLDER BELOW with your actual public key.
#   Generate one if needed: ssh-keygen -t ed25519 -C "devuser@fedora-dev"
#   Then: cat ~/.ssh/id_ed25519.pub
#
# Layer 2 (%post block): Belt-and-suspenders fallback that creates the
#   .ssh directory with correct ownership and permissions regardless of
#   whether the sshkey directive succeeded, and supports injecting multiple
#   keys or keys fetched from a URL (e.g. GitHub).
# ------------------------------------------------------------------------------
rootpw --lock
user --name=devuser --gecos="Dev User" --groups=wheel,docker --password=yourpassword

# -- Layer 1: Anaconda native key injection --
# Replace this entire placeholder with your real public key string.
# Format: sshkey --username=<user> "<full public key line>"
# Example (Ed25519):
#   sshkey --username=devuser "ssh-ed25519 AAAAC3Nza... user@host"
# Example (RSA):
#   sshkey --username=devuser "ssh-rsa AAAAB3Nza... user@host"
#
# UNCOMMENT AND REPLACE before use:
# sshkey --username=devuser "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI_REPLACE_WITH_YOUR_PUBLIC_KEY devuser@fedora-dev"

# ------------------------------------------------------------------------------
# BOOTLOADER & DISK — DUAL BOOT CONFIGURATION
# Hardware: Asus ProArt 16 7606WV — 4TB NVMe (nvme0n1)
#
# CRITICAL PRE-INSTALL CHECKLIST (do these in Windows BEFORE booting installer):
#   1. Disable Fast Startup:
#      Control Panel → Power Options → Choose what power buttons do
#      → Turn on fast startup: UNCHECK → Save changes
#   2. Check BitLocker:
#      Settings → Privacy & Security → Device Encryption
#      If enabled: save recovery key to USB/printed copy before proceeding
#   3. Shrink Windows partition from Disk Management:
#      Right-click Start → Disk Management → right-click C: → Shrink Volume
#      Shrink by at least 524288 MB (512 GB) — more if you want a larger /home
#      Leave the shrunk space as UNALLOCATED (do not create a partition)
#   4. Disable Secure Boot in ASUS BIOS:
#      F2 at boot → Security → Secure Boot → Disabled
#      (Required for Nvidia proprietary driver + akmods to build correctly)
#      Re-enable after enrolling the MOK key post-install if desired.
#   5. In BIOS, set SATA/NVMe mode to AHCI if not already set.
#
# HOW THIS LAYOUT WORKS:
#   clearpart --none  — Anaconda will NOT touch existing Windows partitions.
#   The existing Windows EFI partition (nvme0n1p1) is reused — Fedora adds
#   its own bootloader entry to it without formatting it.
#   All new Fedora partitions are created in the UNALLOCATED space you freed.
#
# PARTITION SIZES (adjust to match your shrunk space):
#   /boot      — 2 GB    (ext4, separate from EFI, houses kernels/initramfs)
#   LVM PV     — rest of free space → split into root + home below
#   /          — 150 GB  (root — generous for all the tooling in this build)
#   /home      — remainder (~350GB+ depending on how much you shrunk Windows)
#
# NO swap partition — ZRAM handles swap entirely (configured in %post step 18)
#
# VERIFY YOUR EFI PARTITION DEVICE before running:
#   Boot a Fedora live USB, open terminal, run: lsblk -f
#   The EFI partition is typically nvme0n1p1, type vfat, ~260-512MB
#   Update --onpart below if your system differs.
# ------------------------------------------------------------------------------
# BOOTLOADER — let Anaconda place it, but no automatic partitioning.
# Partitioning is done MANUALLY in the installer GUI (Blivet-GUI) for this
# variant, because the target disk has leftover partitions from prior install
# attempts that the automatic part/logvol/volgroup commands collide with.
#
# When the installer reaches "Installation Destination":
#   1. Select the nvme0n1 disk
#   2. Choose "Advanced Custom (Blivet-GUI)"
#   3. Delete any leftover 'fedora' LVM volume group and stray ext4 partitions
#      from previous attempts
#   4. Reuse nvme0n1p1 (260MB EFI/SYSTEM) as /boot/efi — do NOT reformat
#   5. Create /boot — 2 GiB, ext4, in free space
#   6. Create an LVM volume group (name it 'fedora_os' to avoid stale-metadata
#      name collisions), and inside it:
#        - /      ext4  150 GiB
#        - /home  ext4  remaining free space
#   7. Click Done and accept the changes
# ------------------------------------------------------------------------------
bootloader --location=boot --append="rhgb quiet amd_iommu=on iommu=pt nvidia-drm.modeset=1"

# Interactive partitioning — installer pauses at the disk screen for you to
# configure storage by hand. Everything else in this kickstart still runs
# automatically (packages, %post, etc).

