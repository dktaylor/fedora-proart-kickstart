#!/usr/bin/env bash
# Full GPU switch: Integrated (dGPU off) + desktop Ollama. Requires LOGOUT.
# For endpoint-only toggle: ollama-backend remote
set -uo pipefail
CONF="/etc/ollama-backend.conf"
DESKTOP_HOST="desktop"; DESKTOP_IP=""; DESKTOP_PORT="11434"
WEBUI_CONTAINER="open-webui"; WEBUI_PORT="3000"
WEBUI_IMAGE="ghcr.io/open-webui/open-webui:main"; KB_REPO_DIR=""
[ -f "$CONF" ] && . "$CONF"
DESKTOP_URL="http://${DESKTOP_HOST}:${DESKTOP_PORT}"
if [[ -t 1 ]]; then G=$'\e[32m'; R=$'\e[31m'; Y=$'\e[33m'; B=$'\e[1m'; X=$'\e[0m'; else G=""; R=""; Y=""; B=""; X=""; fi
info() { printf "${B}>>>${X} %s\n" "$*"; }
ok()   { printf "  ${G}[ok]${X} %s\n" "$*"; }
warn() { printf "  ${Y}[warn]${X} %s\n" "$*"; }
have() { command -v "$1" >/dev/null 2>&1; }
confirm() { local r; read -r -p "  ?  $1 [y/N] " r; [[ "$r" =~ ^[Yy]$ ]]; }
info "Mode: REMOTE (Integrated + ${DESKTOP_URL})"
[[ -n "$KB_REPO_DIR" && -d "$KB_REPO_DIR/.git" ]] && \
    git -C "$KB_REPO_DIR" pull --ff-only >/dev/null 2>&1 && ok "KB synced." || true
have curl && curl -fsS --max-time 5 "${DESKTOP_URL}/api/tags" >/dev/null 2>&1 \
    && ok "Desktop reachable." || warn "Desktop NOT reachable."
systemctl disable --now ollama >/dev/null 2>&1 || true
ok "Local Ollama stopped."
tee /etc/profile.d/ollama-endpoint.sh >/dev/null <<EOF
export OLLAMA_HOST="${DESKTOP_URL}"
EOF
ok "Shell endpoint -> ${DESKTOP_URL}"
have docker && docker info >/dev/null 2>&1 && {
    local_extra=()
    [[ -n "$DESKTOP_IP" ]] && local_extra=(--add-host="${DESKTOP_HOST}:${DESKTOP_IP}") \
        || warn "DESKTOP_IP not set in $CONF"
    docker inspect "$WEBUI_CONTAINER" >/dev/null 2>&1 && docker rm -f "$WEBUI_CONTAINER" >/dev/null
    docker run -d -p "${WEBUI_PORT}:8080" "${local_extra[@]}" \
        -e OLLAMA_BASE_URL="$DESKTOP_URL" -v open-webui:/app/backend/data \
        --name "$WEBUI_CONTAINER" --restart unless-stopped "$WEBUI_IMAGE" >/dev/null
    ok "Open WebUI -> ${DESKTOP_URL} (http://localhost:${WEBUI_PORT})"
}
have supergfxctl && {
    [[ "$(supergfxctl -g 2>/dev/null)" == "Integrated" ]] && ok "GPU already Integrated." || {
        confirm "Switch GPU to Integrated? (dGPU off, logout required)" && \
            supergfxctl -m Integrated && ok "GPU -> Integrated. LOG OUT to apply."
    }
} || warn "supergfxctl not found."
