# flatpaks.conf — Flatpak apps installed during kickstart %post
#
# One app ID per line. Comments (#) and blank lines are ignored.
#
# These are bundled onto the USB FEDORA_DATA partition by write-usb.sh
# (using 'flatpak create-usb', which preserves Flathub as the update
# origin — no reconfiguration needed after install).
#
# Skipped in VM installs (VM_INSTALL=1 in fedora-ks-vm.cfg).

# Gaming
com.heroicgameslauncher.hgl      # Epic + GoG launcher
net.davidotek.pupgui2            # ProtonUp-Qt (Proton-GE installer)

# Utilities
com.github.tchx84.Flatseal       # Flatpak permissions manager
